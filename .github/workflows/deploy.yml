name: Deploy to cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          SSH_HOST: ${{ secrets.KMT_SSH_HOST }}
          SSH_PORT: ${{ secrets.KMT_SSH_PORT }}
          SSH_USER: ${{ secrets.KMT_SSH_USER }}
          SSH_PASSWORD: ${{ secrets.KMT_SSH_PASSWORD }}
        run: |
          missing=()
          for name in SSH_HOST SSH_PORT SSH_USER SSH_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing deploy secrets: ${missing[*]}"
            exit 1
          fi

      - name: Pack release
        run: |
          RELEASE_ARCHIVE="$RUNNER_TEMP/app.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='data' \
            --exclude='logs' \
            -czf "$RELEASE_ARCHIVE" .
          echo "RELEASE_ARCHIVE=$RELEASE_ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload and restart
        env:
          SSH_HOST: ${{ secrets.KMT_SSH_HOST }}
          SSH_PORT: ${{ secrets.KMT_SSH_PORT }}
          SSH_USER: ${{ secrets.KMT_SSH_USER }}
          SSH_PASSWORD: ${{ secrets.KMT_SSH_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "mkdir -p /root/kol-monitor-deploy"
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no -P "$SSH_PORT" \
            "$RELEASE_ARCHIVE" deploy/apply-release.sh "$SSH_USER@$SSH_HOST:/root/kol-monitor-deploy/"
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "bash /root/kol-monitor-deploy/apply-release.sh /root/kol-monitor-deploy/app.tar.gz $GITHUB_SHA"
