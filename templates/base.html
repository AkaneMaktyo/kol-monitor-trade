<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KOL Monitor Trade{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/base.css">
    {% block styles %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a class="nav-brand" href="/">KOL Monitor Trade</a>
        <div class="nav-links">
            <a href="/" class="nav-link">仪表盘</a>
            <a href="/replay" class="nav-link">回放</a>
            <a href="/account" class="nav-link">账户</a>
            <a href="/settings" class="nav-link">配置</a>
            <span class="nav-status" id="nav-ws-status">未连接</span>
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
