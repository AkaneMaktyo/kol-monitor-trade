{% extends "base.html" %}
{% block title %}仪表盘 - KOL Monitor Trade{% endblock %}
{% block styles %}<link rel="stylesheet" href="/static/css/dashboard.css?v=20260521f">{% endblock %}

{% block content %}
<div class="dashboard-grid">
    <section class="panel status-panel">
        <h1>连接状态</h1>
        <div class="status-cards">
            <article class="status-card" id="status-telegram">
                <span class="status-indicator disconnected"></span>
                <div>
                    <h2>Telegram</h2>
                    <p class="status-text">未连接</p>
                    <p class="status-detail">等待启动</p>
                    <p class="status-heartbeat"></p>
                </div>
            </article>
            <article class="status-card" id="status-discord">
                <span class="status-indicator disconnected"></span>
                <div>
                    <h2>Discord</h2>
                    <p class="status-text">未连接</p>
                    <p class="status-detail">等待启动</p>
                    <p class="status-heartbeat"></p>
                </div>
            </article>
            <article class="status-card" id="status-wxpusher">
                <span class="status-indicator disconnected"></span>
                <div>
                    <h2>WxPusher</h2>
                    <p class="status-text">未连接</p>
                    <p class="status-detail">等待启动</p>
                    <p class="status-heartbeat"></p>
                </div>
            </article>
        </div>
        <div class="stats-grid">
            <div class="stat"><strong id="stat-uptime">0s</strong><span>运行时间</span></div>
            <div class="stat"><strong id="stat-total">0</strong><span>消息总数</span></div>
            <div class="stat"><strong id="stat-forwarded">0</strong><span>已转发</span></div>
            <div class="stat"><strong id="stat-ws-clients">0</strong><span>在线面板</span></div>
        </div>
    </section>

    <section class="panel log-panel">
        <div class="log-header">
            <h1>实时日志</h1>
            <div class="log-controls">
                <select id="platform-filter" aria-label="平台筛选">
                    <option value="">全部平台</option>
                    <option value="telegram">Telegram</option>
                    <option value="discord">Discord</option>
                    <option value="wxpusher">WxPusher</option>
                    <option value="system">系统</option>
                </select>
                <select id="author-filter" aria-label="作者筛选">
                    <option value="">全部作者</option>
                </select>
                <button id="btn-clear-logs" type="button">清空视图</button>
                <span id="log-count">0 条</span>
            </div>
        </div>
        <div class="log-container" id="log-container">
            <div class="log-empty">等待消息进入系统...</div>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/app-state.js?v=20260521f"></script>
<script src="/static/js/status-view.js?v=20260521f"></script>
<script src="/static/js/log-detail.js?v=20260521f"></script>
<script src="/static/js/log-view.js?v=20260521f"></script>
<script src="/static/js/app.js"></script>
{% endblock %}
